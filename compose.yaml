name: thermalforge

services:
  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: thermalforge
      POSTGRES_USER: thermalforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thermalforge-dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermalforge -d thermalforge"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.5-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis-data:/data

  object-storage:
    image: localstack/localstack:2026.06.2
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4566/_localstack/health | grep '\"s3\": \"available\"'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro

  api:
    build:
      context: ./thermalforge-api
    command:
      [
        "sh",
        "-c",
        "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    environment: &api-environment
      THERMALFORGE_ENVIRONMENT: development
      THERMALFORGE_DATABASE_URL: postgresql+asyncpg://thermalforge:${POSTGRES_PASSWORD:-thermalforge-dev}@postgres:5432/thermalforge
      THERMALFORGE_AUTO_CREATE_SCHEMA: "false"
      THERMALFORGE_REDIS_URL: redis://redis:6379/0
      THERMALFORGE_QUEUE_ENABLED: "true"
      THERMALFORGE_ARTIFACT_BACKEND: s3
      THERMALFORGE_S3_ENDPOINT_URL: http://object-storage:4566
      THERMALFORGE_S3_BUCKET: thermalforge-artifacts
      THERMALFORGE_S3_ACCESS_KEY: test
      THERMALFORGE_S3_SECRET_KEY: test
      THERMALFORGE_LLM_PROVIDER: ${THERMALFORGE_LLM_PROVIDER:-fixture}
      THERMALFORGE_ANTHROPIC_API_KEY: ${THERMALFORGE_ANTHROPIC_API_KEY:-}
      THERMALFORGE_OPENAI_API_KEY: ${THERMALFORGE_OPENAI_API_KEY:-}
      THERMALFORGE_OPENAI_BASE_URL: ${THERMALFORGE_OPENAI_BASE_URL:-https://api.openai.com/v1}
      THERMALFORGE_OPENAI_MODEL: ${THERMALFORGE_OPENAI_MODEL:-gpt-5.6-sol}
      THERMALFORGE_IMAGE_PROVIDER: ${THERMALFORGE_IMAGE_PROVIDER:-fixture}
      THERMALFORGE_OPENAI_IMAGE_MODEL: ${THERMALFORGE_OPENAI_IMAGE_MODEL:-gpt-image-2}
      THERMALFORGE_IMAGE_TIMEOUT_SECONDS: ${THERMALFORGE_IMAGE_TIMEOUT_SECONDS:-180}
      THERMALFORGE_MODEL_ASSET_ROOT: /app/model-assets
      THERMALFORGE_CORS_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/public/models:/app/model-assets:ro

  worker:
    build:
      context: ./thermalforge-api
    command: ["arq", "app.workers.worker.WorkerSettings"]
    environment: *api-environment
    volumes:
      - ./frontend/public/models:/app/model-assets:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  localstack-data:
